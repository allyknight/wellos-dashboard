name: Sync Jira Data

on:
  # Run automatically at 8:00 AM ET (13:00 UTC) every weekday
  schedule:
    - cron: '0 13 * * 1-5'

  # Also allow a manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    name: Fetch Jira → Update data.js
    runs-on: ubuntu-latest

    # Needs write permission to commit data.js back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Jira sync script
        env:
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL:  https://rvohealth.atlassian.net
          JIRA_PROJECT:   WLOS
        run: node scripts/sync-jira.js

      - name: Commit updated data.js (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --staged --quiet \
            || git commit -m "chore: sync Jira data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
